name: Stock Report Generator

on:
  schedule:
    # 日次（平日）: UTC 22:00 = 日本時間 翌7:00（月〜金 朝）
    - cron: "0 22 * * 0-4"
    # 週次: UTC 22:00 金曜 = 日本時間 土曜 7:00
    - cron: "0 22 * * 5"
  workflow_dispatch:
    inputs:
      mode:
        description: "daily または weekly（手動実行時に指定）"
        required: true
        default: "daily"
        type: choice
        options:
          - daily
          - weekly

jobs:
  generate-report:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Determine mode
        id: mode
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "mode=${{ github.event.inputs.mode }}" >> "$GITHUB_OUTPUT"
          elif [ "${{ github.event.schedule }}" = "0 22 * * 5" ]; then
            echo "mode=weekly" >> "$GITHUB_OUTPUT"
          else
            echo "mode=daily" >> "$GITHUB_OUTPUT"
          fi

      - name: Generate and send report
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          SMTP_HOST: ${{ secrets.SMTP_HOST }}
          SMTP_PORT: ${{ secrets.SMTP_PORT }}
          SMTP_USER: ${{ secrets.SMTP_USER }}
          SMTP_PASS: ${{ secrets.SMTP_PASS }}
          MAIL_TO: ${{ secrets.MAIL_TO }}
        run: python generate_report.py --mode ${{ steps.mode.outputs.mode }}
